services:
  - type: web
    name: astro-audit-worker
    env: python
    region: singapore # Closest region to India for better DB latency
    plan: free 
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: GAS_WEBHOOK_URL
        sync: false
