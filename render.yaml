services:
  - type: web
    name: instaastro-report-generator
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 4 --timeout 3600 --bind 0.0.0.0:$PORT
    envVars:
      - key: METABASE_URL
        value: https://metabase.instaastro.com
      - key: METABASE_USERNAME
        sync: false
      - key: METABASE_PASSWORD
        sync: false
      - key: METABASE_QUESTION
        value: "7631"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CALLMEBOT_APIKEY
        sync: false
